    # 회피 그룹 종류: AGENT, VEHICLE, HARD_OBSTACLE, SOFT_PUSHABLE, LOW_OBSTACLE, THIN_OBSTACLE, GROUND_HAZARD, UNKNOWN_OBSTACLE
